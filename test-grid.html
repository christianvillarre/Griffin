<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Griffin Layout</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
    }

    body {
      padding: 2rem;
    }

 .page {
  width: 100%;
  min-height: calc(100vh - 4rem);
  display: flex;
  flex-direction: column;
}
    /* Main layout */
    .content {
      flex: 1; /* ✅ take remaining height */
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.5rem;
      align-items: stretch; /* ✅ stretch to bottom */
    }

    /* Left column */
    .left-column {
      display: grid;
      grid-template-rows: auto 1fr; /* header + fill */
      gap: 1.5rem;
    }

    .header-box {
      background: white;
      border-radius: 1.5rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-box img {
      width: 64px;
      height: 64px;
      object-fit: contain;
    }

    .header-box h1 {
      margin: 0;
      font-size: 2.5rem;
      font-weight: 700;
      color: #111827;
      line-height: 1;
    }

    .big-box {
      background: white;
      border-radius: 1.5rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      color: #6b7280;

      height: 100%; /* ✅ fill remaining space */
    }

    /* Right side */
    .right-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 1.5rem;
      height: 100%; /* ✅ match left height */
    }

    .small-box {
      background: white;
      border-radius: 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      font-size: 0.95rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      body {
        padding: 1rem;
      }

      .content {
        grid-template-columns: 1fr;
      }

      .right-grid {
        grid-template-columns: 1fr 1fr;
        height: auto;
      }

      .header-box h1 {
        font-size: 2rem;
      }
    }

    @media (max-width: 520px) {
      .right-grid {
        grid-template-columns: 1fr;
      }

      .header-box img {
        width: 52px;
        height: 52px;
      }

      .header-box h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="content">
      <div class="left-column">
        <div class="header-box">
          <img src="/images/GriffinIcon.png" alt="Griffin" />
          <h1>Dashboard</h1>
        </div>

        <div class="big-box">Big Box</div>
      </div>

      <div class="right-grid">
        <div class="small-box">Box 1</div>
        <div class="small-box">Box 2</div>
        <div class="small-box">Box 3</div>
        <div class="small-box">Box 4</div>
      </div>
    </div>
  </div>
</body>
</html>
