<header class="site-header">
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <button id="contactToggle" class="contact-link" type="button">Contact</button>
  </nav>
</header>

<div class="page-wrap" id="pageWrap">
  <main class="main-content">
    <section class="hero">
      <h1>Your Page Content</h1>
      <p>This content shifts left when the contact panel opens.</p>
    </section>
  </main>

  <aside class="contact-drawer" id="contactDrawer" aria-hidden="true">
    <div class="drawer-inner">
      <button class="close-btn" id="contactClose" type="button" aria-label="Close contact form">
        ×
      </button>

      <h2>Contact Us</h2>
      <form class="contact-form">
        <label>
          Name
          <input type="text" name="name" placeholder="Your name" />
        </label>

        <label>
          Email
          <input type="email" name="email" placeholder="you@example.com" />
        </label>

        <label>
          Message
          <textarea name="message" rows="6" placeholder="Write your message"></textarea>
        </label>

        <button type="submit">Send Message</button>
      </form>
    </div>
  </aside>
</div>

<div class="backdrop" id="backdrop"></div>
