<style>
  :root{
    --bg:#ffffff;
    --ink:#111111;

    --square: 96;   /* px */
    --gap: 8;       /* px */
    --rectW: 254;   /* px */
    --rectH: 96;    /* px */

    --ovalW: 800;   /* wider side images */
    --beamY: 0px; /* ✅ driven by JS */
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; }

  body{
    margin:0;
    font-family: 'Zalando Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    overflow:auto;
  }

  /* ===================== NAVBAR ===================== */
  .navbar{
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: min(900px, calc(100% - 28px));
    height: 84px;
    border-radius: 25px;
    background: #00202e70;
    border: none;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 50;

    display:flex;
    align-items:center;
    justify-content: space-between;
    padding: 10px 20px;
  }

  .nav-logo{
    display:flex;
    align-items:center;
    gap: 10px;
    min-width: 140px;
  }

  .nav-logo img{
    height: 48px;
    width: auto;
    display:block;
    object-fit: contain;
    transform: translateY(-3px);
  }

  .nav-links{
    display:flex;
    align-items:center;
    gap: 10px;
    text-transform: uppercase;
  }

  .nav-link{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    height: 42px;
    padding: 0 14px;
    border-radius: 12px;
    text-decoration:none;
    color: rgba(255,255,255,0.92);
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.01em;
    border: 1px solid rgba(255,255,255,0.0);
    transition: background .2s ease, border-color .2s ease, transform .2s ease, color .2s ease;
    white-space: nowrap;
  }

  .nav-link:hover{ color:#F00303; }

  /* ✅ Dropdown trigger selected (stays red + arrow flips up) */
  .nav-link[data-dropdown].is-active,
  .nav-link[data-dropdown].is-active:hover {
    color: #F00303; /* drives text + chevron because SVG uses currentColor */
  }

  .nav-link[data-dropdown].is-active .nav-chevron{
    transform: rotate(180deg);
    opacity: 1;
  }

  .nav-link--contact{
    background: rgba(255,255,255,0.95);
    color: #111;
    border: 1px solid rgba(255,255,255,0.65);
    padding: 0 16px;
  }
  .nav-link--contact:hover{
    background: rgba(255,255,255,1);
    border-color: rgba(255,255,255,0.9);
    color:#111;
  }

  @media (max-width: 560px){
    .nav-link--hide-sm{ display:none; }
  }

  .nav-link--has-chevron{ gap: 3px; }

  .nav-chevron{
    width: 16px;
    height: 16px;
    display: block;
    transform: translateY(0px);
    opacity: 0.9;
    transition: transform .2s ease, opacity .2s ease;
  }
  .nav-link:hover .nav-chevron{ opacity: 1; }

  /* ---------- Site ---------- */
  #site{
    min-height: 260vh;
    padding: 0;
  }

  /* =========================================================
     ✅ NEW: 200vh BACKGROUND WRAP (Hero + next section)
     - black base for 200vh
     - diagonal "radial-ish" blue band limited to ~20%–70% height
     - wave indent into next WHITE section
     ========================================================= */
.intro-wrap{
  position: relative;
  min-height: 200vh;
  overflow: hidden;
  background:#000;
}

/* ONE full-width diagonal beam */
/* ONE full-width diagonal beam (guaranteed to reach across any screen) */

/* ONE full-width diagonal beam (guaranteed to reach across any screen) */
.intro-wrap::before{
  content:"";
  position:absolute;
  z-index:0;

  width: 520vmax;
  height: 520vmax;

  left: 50%;
  top: 50%;

  /* ✅ add var offset (moves beam up/down smoothly) */
  transform: translate(-45%, calc(-55% + var(--beamY))) rotate(-115deg);
  transform-origin: center;

  background: linear-gradient(
    90deg,
    transparent 0%,
    transparent 44%,
    rgba(26, 92, 145, 0.229) 48%,
    rgba(33, 94, 144, 0.323)  50%,
    rgba(19, 78, 126, 0.221) 52%,
    transparent 56%,
    transparent 100%
  );

  mask-image: linear-gradient(
    to bottom,
    transparent 0%,
    transparent 18%,
    black 22%,
    black 70%,
    transparent 74%,
    transparent 100%
  );
  -webkit-mask-image: linear-gradient(
    to bottom,
    transparent 0%,
    transparent 18%,
    black 22%,
    black 70%,
    transparent 74%,
    transparent 100%
  );

  pointer-events:none;
}

/* side images (img3/img4) responsive: narrower + more inset on small screens */
.side-img{
  position:absolute;
  top:0;

  /* ✅ height responds to WIDTH (vw) but is capped by viewport height (vh) */
  height: clamp(140vh, 95vw, 150vh);

  /* ✅ width already responds to width; make it a bit more aggressive */
  width: clamp(850px, 45vw, 900px);

  object-fit: cover;
  opacity: 0.95;
  z-index: 1;
  pointer-events:none;

  /* ✅ keep your inset logic */
  --edgeInset: clamp(0px, (900px - 100vw) * 0.18, 160px);
}

/* push inward from edges */
/* Move images toward center instead of edges */
/* ============================= */
/* Default: 1600px and wider */
/* Stick to sides (no offset) */
/* ============================= */

.side-img--left{
  left: 0;
  transform: none;
  transform: translateX(-10%);
}

.side-img--right{
  right: 0;
  left: auto;
  transform: none;
  transform: translateX(10%);
}

/* ============================= */
/* Under 1600px: center-style */
/* ============================= */

@media (max-width: 1599px){
  .side-img--left{
    left: 50%;
    right: auto;
    transform: translateX(-120%);
  }

  .side-img--right{
    left: 50%;
    right: auto;
    transform: translateX(20%);
  }
}

  /* wave indent (white) into next section */
  .wave-divider{
    position:absolute;
    left:0;
    bottom:-1px;
    width:100%;
    height: 180px;
    z-index: 3;
    pointer-events:none;
  }
  .wave-divider path{ fill:#fff; }

  /* ---------- HERO (no more 200vh ::after background) ---------- */
  .hero{
    min-height: 100vh;
    height: 100vh;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    justify-content: flex-start;
    padding-top: 200px;
    padding-left: 20px;
    padding-right: 20px;
    background: none;
  }

  /* optional subtle tint over the bg (keep it light) */
/* ✅ ONE overlay for the entire 200vh area (prevents the seam) */
.intro-wrap::after{
  content:"";
  position:absolute;
  inset:0;
  background: rgba(0,0,0,0.12);
  z-index: 1;
  pointer-events:none;
}
  .hero > *{
    position: relative;
    z-index: 2;
    color: white;
  }

  .hero h1{
    font-size: clamp(34px, 7vw, 76px);
    line-height:1.05;
    margin:0 0 12px;
    letter-spacing:-0.02em;
  }

  .hero p{
    margin:0 0 20px;
    font-size:18px;
    opacity:.78;
    max-width:65ch;
  }

  .card-row{
    display:grid;
    grid-template-columns: repeat(3, minmax(0,1fr));
    gap:16px;
    margin-top:28px;
    width: min(1000px, 100%);
  }
  .card{
    border:1px solid rgba(255,255,255,.22);
    border-radius:16px;
    padding:16px;
   
    min-height:120px;
    color: rgba(255,255,255,0.92);
  }

  /* first spacer INSIDE the 200vh wrap (dark) */
.spacer--dark{
  height: 100vh;
  max-width: 1000px;
  margin: 0 auto;
  border-radius: 18px;
  background: none;

  display: flex;
  flex-direction: column;    /* ✅ helps keep heading perfectly centered */
  align-items: center;
  justify-content: flex-start;
  margin-top: 10rem;
  text-align: center;        /* ✅ center text */
  padding: 0 20px;           /* ✅ prevents edge clipping on small screens */

  color: #fff;
}

  /* white sections AFTER the wave */
  .spacer--white{
    height:120vh;
    max-width:1000px;
    margin:24px auto;
    border-radius:18px;
    background:#fff;
    border:none;
    display:flex;
    align-items:center;
    justify-content:center;
    color: rgba(0,0,0,0.65);
    font-weight:600;
    letter-spacing:.02em;
  }

  @media (max-width: 900px){
    .card-row{ grid-template-columns: 1fr; }
  }

  /* ---------- SVG Loader Overlay ---------- */
  #loaderSvg{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:9999;
    display:block;
    pointer-events:none;
  }
</style>

/* ===== Animated underline (always red) ===== */

  content:"";

  transform: scaleX(0);
  transform-origin: left;
  opacity: 0.95;
  transition: transform 180ms cubic-bezier(.22,1,.36,1);
}

/* underline animates in */

.nav-dd-greenlink:focus-visible::after{
  transform: scaleX(1);
}

/* ===== Arrow default state ===== */

  color: #ffffff;                      /* text fades to white */

  <script>
  const sleep = (ms) => new Promise(r => setTimeout(r, ms));
  const easeOut = (t) => 1 - Math.pow(1 - t, 4.5);
  const easeInOutCubic = (t) =>
    t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;

  // Easing helpers (no overshoot)
  const easeLinear   = (t) => t;
  const easeSoftOut  = (t) => 1 - Math.pow(1 - t, 4.5);
  const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);
  const easeOutQuint = (t) => 1 - Math.pow(1 - t, 6);

  // ✅ ONLY CHANGE: make the square icon a bit narrower (width only)
  const SQUARE_WIDTH_SCALE = 0.90; // 0.95 = slight, 0.9 = noticeable

  function lockScroll(){
    const y = window.scrollY || document.documentElement.scrollTop || 0;
    document.body.dataset.scrollY = String(y);
    document.body.style.position = "fixed";
    document.body.style.top = `-${y}px`;
    document.body.style.left = "0";
    document.body.style.right = "0";
    document.body.style.width = "100%";
  }
  function unlockScroll(){
    const y = parseInt(document.body.dataset.scrollY || "0", 10);
    document.body.style.position = "";
    document.body.style.top = "";
    document.body.style.left = "";
    document.body.style.right = "";
    document.body.style.width = "";
    document.body.removeAttribute("data-scroll-y");
    window.scrollTo(0, y);
  }

  function animateAttrs(el, from, to, duration, easeFn = (x)=>x){
    return new Promise(resolve=>{
      const t0 = performance.now();
      function frame(now){
        const t = Math.min(1, (now - t0)/duration);
        const e = easeFn(t);

        if ("x" in from) el.setAttribute("x", from.x + (to.x - from.x)*e);
        if ("y" in from) el.setAttribute("y", from.y + (to.y - from.y)*e);
        if ("w" in from) el.setAttribute("width",  from.w + (to.w - from.w)*e);
        if ("h" in from) el.setAttribute("height", from.h + (to.h - from.h)*e);

        if ("tx" in from || "sx" in from || "sy" in from || "tx" in to || "sx" in to || "sy" in to){
          const tx = (from.tx ?? 0) + ((to.tx ?? 0) - (from.tx ?? 0))*e;
          const hasScale = ("sx" in from) || ("sy" in from) || ("sx" in to) || ("sy" in to);
          if (hasScale){
            const sx = (from.sx ?? 1) + ((to.sx ?? 1) - (from.sx ?? 1))*e;
            const sy = (from.sy ?? 1) + ((to.sy ?? 1) - (from.sy ?? 1))*e;
            el.setAttribute("transform", `translate(${tx},0) scale(${sx},${sy})`);
          } else {
            el.setAttribute("transform", `translate(${tx},0)`);
          }
        }

        if ("op" in from){
          const op = from.op + (to.op - from.op)*e;
          el.setAttribute("opacity", op);
        }

        if(t < 1) requestAnimationFrame(frame);
        else resolve();
      }
      requestAnimationFrame(frame);
    });
  }

  function sizeScene(){
    const svg = document.getElementById("loaderSvg");
    const w = window.innerWidth;
    const h = window.innerHeight;
    svg.setAttribute("viewBox", `0 0 ${w} ${h}`);

    const root = getComputedStyle(document.documentElement);
    const sq    = parseFloat(root.getPropertyValue("--square")) || 96;
    const gap   = parseFloat(root.getPropertyValue("--gap")) || 8;
    const rectW = parseFloat(root.getPropertyValue("--rectW")) || 254;
    const rectH = parseFloat(root.getPropertyValue("--rectH")) || 96;
    const ovalW = parseFloat(root.getPropertyValue("--ovalW")) || 800;

    // ✅ derived width for the square only
    const sqW = sq * SQUARE_WIDTH_SCALE;
    const sqOffsetX = (sq - sqW) / 2; // keeps the narrower icon centered

    // base mask + cover
    const maskBase = document.getElementById("maskBase");
    const cover = document.getElementById("cover");
    maskBase.setAttribute("width", w);
    maskBase.setAttribute("height", h);
    cover.setAttribute("width", w);
    cover.setAttribute("height", h);

    // Stage 1: square alone centered (using base square for layout)
    const sqX = (w - sq)/2;
    const sqY = (h - sq)/2;

    // Stage 2: centered group (layout uses sq so overall spacing/centering stays identical)
    const groupW  = sq + gap + rectW;
    const groupH  = Math.max(sq, rectH);
    const gxGroup = (w - groupW)/2;
    const gyGroup = (h - groupH)/2;

    // rect pinned to square: start + final (layout uses sq)
    const rectStartX = sqX + sq + gap;
    const rectStartY = sqY + (sq - rectH) / 2;

    const rectFinalX = gxGroup + sq + gap;
    const rectFinalY = gyGroup + (sq - rectH) / 2;

    // --- square image (ONLY width scaled) ---
    const squareImg = document.getElementById("squareImg");
    squareImg.setAttribute("x", sqX + sqOffsetX);
    squareImg.setAttribute("y", sqY);
    squareImg.setAttribute("width", sqW);
    squareImg.setAttribute("height", sq);
    squareImg.setAttribute("opacity", 1);

    // clip rect must match the same width & x
    const squareClipRect = document.getElementById("squareClipRect");
    squareClipRect.setAttribute("x", sqX + sqOffsetX);
    squareClipRect.setAttribute("y", sqY + sq);
    squareClipRect.setAttribute("width", sqW);
    squareClipRect.setAttribute("height", 0);

    // rect logo
    const rectImg = document.getElementById("rectImg");
    rectImg.setAttribute("width", rectW);
    rectImg.setAttribute("height", rectH);
    rectImg.setAttribute("x", rectStartX);
    rectImg.setAttribute("y", rectStartY);
    rectImg.setAttribute("opacity", 1);

    const rectRevealRect = document.getElementById("rectRevealRect");
    rectRevealRect.setAttribute("x", rectStartX);
    rectRevealRect.setAttribute("y", rectStartY + rectH);
    rectRevealRect.setAttribute("width", rectW);
    rectRevealRect.setAttribute("height", 0);

    // ovals
    const ovalLImg = document.getElementById("ovalLImg");
    const ovalRImg = document.getElementById("ovalRImg");
    ovalLImg.setAttribute("width", ovalW);
    ovalLImg.setAttribute("height", h);
    ovalLImg.setAttribute("x", 0);
    ovalLImg.setAttribute("y", 0);

    ovalRImg.setAttribute("width", ovalW);
    ovalRImg.setAttribute("height", h);
    ovalRImg.setAttribute("x", w - ovalW);
    ovalRImg.setAttribute("y", 0);

    return {
      w, h,
      sq, sqW, sqOffsetX,
      gap, rectW, rectH, ovalW,
      sqX, sqY, gxGroup, gyGroup,
      rectStartX, rectStartY, rectFinalX, rectFinalY
    };
  }

  (async function run(){
    lockScroll();

    let S = sizeScene();
    const onResize = () => { S = sizeScene(); };
    window.addEventListener("resize", onResize, { passive:true });

    const maskWindow = document.getElementById("maskWindow");
    maskWindow.setAttribute("x", 0);
    maskWindow.setAttribute("y", 0);
    maskWindow.setAttribute("width", 0);
    maskWindow.setAttribute("height", 0);

    const squareImg      = document.getElementById("squareImg");
    const squareClipRect = document.getElementById("squareClipRect");
    const rectImg        = document.getElementById("rectImg");
    const rectRevealRect = document.getElementById("rectRevealRect");
    const ovalLImg       = document.getElementById("ovalLImg");
    const ovalRImg       = document.getElementById("ovalRImg");

    // ovals start offscreen
    ovalLImg.setAttribute("transform", `translate(${-S.ovalW},0)`);
    ovalRImg.setAttribute("transform", `translate(${ S.ovalW},0)`);

    // square reveal starts bottom -> top (use sqW + offset)
    squareClipRect.setAttribute("x", S.sqX + S.sqOffsetX);
    squareClipRect.setAttribute("y", S.sqY + S.sq);
    squareClipRect.setAttribute("width", S.sqW);
    squareClipRect.setAttribute("height", 0);

    // rect reveal starts closed at bottom (pinned start)
    rectRevealRect.setAttribute("x", S.rectStartX);
    rectRevealRect.setAttribute("y", S.rectStartY + S.rectH);
    rectRevealRect.setAttribute("width", S.rectW);
    rectRevealRect.setAttribute("height", 0);

    // 1) reveal square (BOTTOM -> TOP) (width = sqW, height = sq)
    await animateAttrs(
      squareClipRect,
      { x: S.sqX + S.sqOffsetX, y: S.sqY + S.sq, w: S.sqW, h: 0 },
      { x: S.sqX + S.sqOffsetX, y: S.sqY,        w: S.sqW, h: S.sq },
      1400,
      easeLinear
    );

    await sleep(120);

    // 2) move into centered pair (layout still uses sqX/gxGroup, but we keep offset consistent)
    const sqToX = S.gxGroup;
    const moveDuration = 900;

    const moveSquare = Promise.all([
      animateAttrs(
        squareImg,
        { x:S.sqX + S.sqOffsetX, y:S.sqY,     w:S.sqW, h:S.sq },
        { x:sqToX + S.sqOffsetX, y:S.gyGroup, w:S.sqW, h:S.sq },
        moveDuration,
        easeInOutCubic
      ),
      animateAttrs(
        squareClipRect,
        { x:S.sqX + S.sqOffsetX, y:S.sqY,     w:S.sqW, h:S.sq },
        { x:sqToX + S.sqOffsetX, y:S.gyGroup, w:S.sqW, h:S.sq },
        moveDuration,
        easeInOutCubic
      )
    ]);

    const moveTextWithSquare = animateAttrs(
      rectImg,
      { x:S.rectStartX, y:S.rectStartY, w:S.rectW, h:S.rectH },
      { x:S.rectFinalX, y:S.rectFinalY, w:S.rectW, h:S.rectH },
      moveDuration,
      easeInOutCubic
    );

    const revealTextPinned = animateAttrs(
      rectRevealRect,
      { x:S.rectStartX, y:S.rectStartY + S.rectH, w:S.rectW, h:0 },
      { x:S.rectFinalX, y:S.rectFinalY,           w:S.rectW, h:S.rectH },
      moveDuration,
      easeInOutCubic
    );

    const ovalsIn = Promise.all([
      animateAttrs(ovalLImg, { tx:-S.ovalW }, { tx:0 }, 1100, easeOut),
      animateAttrs(ovalRImg, { tx: S.ovalW }, { tx:0 }, 1100, easeOut),
    ]);

    await Promise.all([moveSquare, moveTextWithSquare, revealTextPinned, ovalsIn]);

    // fade out logo + icon
    await Promise.all([
      animateAttrs(squareImg, { op: 1 }, { op: 0 }, 220, easeOutCubic),
      animateAttrs(rectImg,   { op: 1 }, { op: 0 }, 220, easeOutCubic),
    ]);

    // 4) MASK: 2 phases
    const startSize = 16;

    const maskPhase1 = {
      vw: 0.99,
      vh: 0.005,
      duration: 750,
      ease: easeSoftOut,
      hold: 120
    };

    const maskPhase2 = {
      duration: 950,
      ease: easeOutQuint
    };

    const midW = S.w * maskPhase1.vw;
    const midH = S.h * maskPhase1.vh;
    const midX = (S.w - midW) / 2;
    const midY = (S.h - midH) / 2;

    await animateAttrs(
      maskWindow,
      { x:(S.w-startSize)/2, y:(S.h-startSize)/2, w:startSize, h:startSize },
      { x:midX, y:midY, w:midW, h:midH },
      maskPhase1.duration,
      maskPhase1.ease
    );

    if ((maskPhase1.hold ?? 0) > 0) await sleep(maskPhase1.hold);

    await animateAttrs(
      maskWindow,
      { x:midX, y:midY, w:midW, h:midH },
      { x:0, y:0, w:S.w, h:S.h },
      maskPhase2.duration,
      maskPhase2.ease
    );

    window.removeEventListener("resize", onResize);
    document.getElementById("loaderSvg").remove();
    unlockScroll();

    const heroIcon = document.getElementById("heroDropIcon");
    if (heroIcon) {
      heroIcon.style.transition =
        "transform 1400ms cubic-bezier(.22,1,.36,1), opacity 500ms ease";
      heroIcon.style.opacity = "1";
      requestAnimationFrame(() => {
        heroIcon.style.transform = "translate(-50%, 0) scale(1)";
      });
    }
  })();
</script>

  function renderRight(tab) {

  // Small RAF tween helper

        onUpdate(t);
        if (t < 1) requestAnimationFrame(frame);
        else resolve();
      }

  // Easing: quick-out (feels snappy)

  async function swapRightQuick(nextTabKey) {

    isAnimatingRight = true;

    const nextTab = getTab(nextTabKey);

    // Keep dropdown open and prevent accidental clicks mid-animation
    ddRight.style.pointerEvents = "none";

    // --- OUT (quick) ---
    const OUT_DUR = 95; // quick
    await tween(OUT_DUR, (t) => {
      const e = easeOut(t);
      ddRight.style.opacity = String(1 - e);
      ddRight.style.transform = `translateY(${0 + (2 * e)}px)`; // tiny sink
    });

    // --- SWAP (hidden) ---
    renderRight(nextTab);

    // reset for IN
    ddRight.style.opacity = "0";
    ddRight.style.transform = "translateY(8px)"; // start slightly lower

    // --- IN (quick + up) ---
    const IN_DUR = 140; // slightly longer than OUT, still quick
    await tween(IN_DUR, (t) => {
      const e = easeOut(t);
      ddRight.style.opacity = String(e);
      ddRight.style.transform = `translateY(${8 - (8 * e)}px)`; // rise into place
    });

    // cleanup
    ddRight.style.opacity = "";
    ddRight.style.transform = "";
    ddRight.style.willChange = "";
    ddRight.style.pointerEvents = "";

    // update state + left selection
    activeCapTab = nextTabKey;
    renderLeft(activeCapTab);

    isAnimatingRight = false;
  }

  /* ===================== OPEN/CLOSE ===================== */
  function openDropdown(key) {

    clearActiveTriggers();

    clearActiveTriggers();

  document.querySelectorAll(".nav-link[data-dropdown]").forEach(link => {

      if (isSame) closeDropdown();
      else openDropdown(key);

  // Inside dropdown: left tabs + right links

      (navbar && navbar.contains(e.target));

    if (!clickedInside) closeDropdown();
  });

  // ESC closes
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeDropdown();
  });

  // Close dropdown when clicking non-dropdown nav links
  document.querySelectorAll(".nav-link:not([data-dropdown])")
    .forEach(link => link.addEventListener("click", () => closeDropdown()));
});

<script>
(() => {
  const wrap = document.querySelector(".intro-wrap");
  if (!wrap) return;

  const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduceMotion) return;

  let current = 0;
  let rafId = null;

  function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }
  function lerp(a,b,t){ return a + (b-a)*t; }

  function computeTarget() {
    const rect = wrap.getBoundingClientRect();
    const vh = window.innerHeight;

    const total = rect.height - vh;
    if (total <= 0) return 0;

    const passed = -rect.top;               // how far into the wrap
    const progress = clamp(passed / total, 0, 1);

    const maxShift = vh * 0.28;             // tune travel amount
    return lerp(0, -maxShift, progress);    // scroll down => beam moves up
  }

  function tick(){
    const target = computeTarget();

    // ✅ Smooth follow (no bounce)
    // higher = follows quicker, lower = more "glide"
    const follow = 0.085; // try 0.06–0.12
    current += (target - current) * follow;

    // deadzone to prevent micro jitter at rest
    if (Math.abs(target - current) < 0.02) current = target;

    document.documentElement.style.setProperty("--beamY", `${current}px`);
    rafId = requestAnimationFrame(tick);
  }

  rafId = requestAnimationFrame(tick);

  window.addEventListener("resize", () => {
    // no special handling needed; computeTarget uses latest vh/rect
  }, { passive: true });
})();
</script>
